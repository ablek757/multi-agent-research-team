llm:
  api_key: ""              # 优先读取环境变量 OPENAI_API_KEY
  base_url: ""             # 优先读取环境变量 OPENAI_BASE_URL；留空则使用 OpenAI 官方
  model: "gpt-4o-mini"     # 默认模型，可按需改为 gpt-4o、deepseek-chat 等
  temperature: 0.3
  max_tokens: 4096

search:
  backend: "duckduckgo"    # 当前仅支持 duckduckgo
  results_per_query: 5     # 每个查询返回的搜索结果数
  top_k_to_fetch: 3        # 每个查询实际抓取并阅读的前 K 个页面
  max_workers: 5           # 并发抓取网页的线程数
  region: "wt-wt"
  safe_search: "moderate"

research:
  depth: 2                 # 搜索迭代轮数（包含初始轮）
  queries_per_round: 3     # 每轮生成的搜索查询数
  max_content_length: 12000 # 单页抓取后截断的最大字符数
  language: "zh"           # 报告语言：zh 或 en

report:
  title: "深度研究报告"
  output_dir: "output"
  include_citations: true

team:
  enable_fact_checker: true      # 是否启用事实核查员
  enable_editor: true            # 是否启用编辑审核员
  max_research_iterations: 0     # 研究阶段最大迭代轮数（含初始轮）；0 表示使用 research.depth
  review_rounds: 1               # 编辑审稿-修订轮数
  min_credibility_threshold: 5   # 触发补充搜索的可信度阈值（1-10）
  max_claims_to_verify: 10       # 每轮事实核查员检查的最大声明数

kb:
  data_dir: "data"               # 知识库存储目录
  auto_ingest: true              # 生成报告后是否自动导入知识库
