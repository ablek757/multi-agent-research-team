llm:
  api_key: ""              # 优先读取环境变量 OPENAI_API_KEY
  base_url: ""             # 优先读取环境变量 OPENAI_BASE_URL；留空则使用 OpenAI 官方
  model: "gpt-4o-mini"     # 默认模型，可按需改为 gpt-4o、deepseek-chat 等
  temperature: 0.3
  max_tokens: 4096

search:
  backend: "duckduckgo"    # 当前仅支持 duckduckgo
  results_per_query: 5     # 每个查询返回的搜索结果数
  top_k_to_fetch: 3        # 每个查询实际抓取并阅读的前 K 个页面
  max_workers: 5           # 并发抓取网页的线程数
  region: "wt-wt"
  safe_search: "moderate"

research:
  depth: 2                 # 搜索迭代轮数（包含初始轮）
  queries_per_round: 3     # 每轮生成的搜索查询数
  max_content_length: 12000 # 单页抓取后截断的最大字符数
  language: "zh"           # 报告语言：zh 或 en

report:
  title: "深度研究报告"
  output_dir: "output"
  include_citations: true

team:
  enable_fact_checker: true      # 是否启用事实核查员
  enable_editor: true            # 是否启用编辑审核员
  max_research_iterations: 0     # 研究阶段最大迭代轮数（含初始轮）；0 表示使用 research.depth
  review_rounds: 1               # 编辑审稿-修订轮数
  min_credibility_threshold: 5   # 触发补充搜索的可信度阈值（1-10）
  max_claims_to_verify: 10       # 每轮事实核查员检查的最大声明数

kb:
  data_dir: "data"               # 知识库存储目录
  auto_ingest: true              # 生成报告后是否自动导入知识库

cognition:
  enabled: false                 # 是否启用认知增强控制层
  reflection_rounds: 1           # 每轮研究后元认知反思次数
  max_subtasks: 5                # 主题最大子任务拆分数量
  enable_checkpoints: false      # 是否在关键节点暂停等待人工确认
  max_replan_iterations: 2       # 单次研究最大重规划次数

memory:
  enabled: false                 # 是否启用向量长期记忆
  backend: "openai"              # openai / sentence_transformers / mock
  model: "text-embedding-3-small" # embedding 模型
  vector_dir: "vectors"          # 向量存储目录
  chunk_size: 500                # 文本分块大小
  chunk_overlap: 50              # 分块重叠大小
  top_k: 10                      # 语义检索返回数量

output:
  formats:                       # 默认输出格式
    - "markdown"
    # - "slides"
    # - "html"
    # - "dataset_brief"
    # - "action_plan"
  slides_template: "default"     # PPT 模板
  html_theme: "default"          # HTML 主题
  dataset_brief_max_rows: 100    # 数据集摘要最大行数
  action_plan_max_items: 20      # 可执行方案最大条目数

style:
  enabled: false                 # 是否启用用户研究风格学习
  profile_path: "data/user_style_profile.json"
  min_samples: 1                 # 触发风格学习的最小样本数
  auto_learn_from_edits: true    # 是否自动从修订中学习

verification:
  enabled: true                  # 是否启用可信验证与溯源系统
  max_claims: 10                 # 每份报告验证的最大声明数
  confidence_threshold: 50       # 低于此分数（0-100）的声明触发自动修订
  enable_hallucination_detection: true  # 是否启用幻觉风险检测
  enable_auto_revision: false    # 是否根据审计结果自动修订报告

intelligence:
  enabled: true
  scan_interval_hours: 6         # 扫描间隔（小时）
  lookback_days: 1               # 每次扫描回看多少天的新文献
  sources:                       # 启用的学术源
    - arxiv
    - pubmed
    - biorxiv
    - semantic_scholar
    - openalex
  thresholds:                    # 生成告警的最低分数（1-10）
    relevance: 7
    novelty: 7
    breakthrough: 7
  notify:                        # 推送渠道
    channels:
      - console
      # - email
      # - webhook
    email:
      to: ["user@example.com"]
      smtp_host: "smtp.example.com"
      smtp_port: 587
      smtp_user: ""
      smtp_password: ""
    webhook:
      url: ""
